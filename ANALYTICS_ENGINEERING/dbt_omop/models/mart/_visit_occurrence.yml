version 2:

models:
  - name: visit_occurrence
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#visit_occurrence"
    columns:
      - name: visit_occurrence_id
        data_type: integer
        tests:
          - not_null
          - unique

      - name: person_id
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('person')
                field: person_id

      - name: visit_concept_id
        data_type: integer
        tests:
          - not_null
          - valid_concept_in_domain:
              arguments:
                domain_id: Visit

      - name: visit_start_date
        data_type: date
        tests:
          - not_null

      - name: visit_start_datetime
        data_type:  timestamp
      
      - name: visit_end_date
        data_type: date
        tests:
          - not_null
      
      - name: visit_end_datetime
        data_type: timestamp
      
      - name: visit_type_concept_id
        data_type: integer
        tests:
          - not_null
          - valid_concept_in_domain:
              arguments:
                domain_id: Visit Type
      
      - name: provider_id
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('provider')
                field: provider_id
      
      - name: care_site_id
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('care_site')
                field: care_site_id
      
      - name: visit_source_value
        data_type: varchar(50)
      
      - name: visit_source_concept_id
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      
      - name: admitting_source_concept_id
        data_type: integer
        tests:
          - valid_concept_in_domain:
              arguments:
                domain_id: Visit
      
      - name: admitting_source_value
        data_type: varchar(50)
      
      - name: discharge_to_concept_id
        data_type: integer
        tests:
          - valid_concept_in_domain:
              arguments:
                domain_id: Visit
      
      - name: discharge_to_source_value
        data_type: varchar(50)
      
      - name: preceding_visit_occurrence_id
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('visit_occurrence')
                field: visit_occurrence_id