version: 2

models:
  - name: stg_concept
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#concept"
    columns:
      - name: concept_id
        description: "A unique identifier for each Concept across all domains."
        data_type: integer
        tests:
          - unique
          - not_null
      - name: concept_name
        description: "An unambiguous, meaningful and descriptive name for the Concept."
        data_type: varchar(255)
        tests:
          - not_null
      - name: domain_id
        description: "A foreign key to the DOMAIN table the Concept belongs to."
        data_type: varchar(20)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('domain')
                field: domain_id
      - name: vocabulary_id
        description: "A foreign key to the VOCABULARY table indicating from which source the Concept has been adapted."
        data_type: varchar(20)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vocabulary')
                field: vocabulary_id
      - name: concept_class_id
        description: "The attribute or concept class of the Concept. Examples are 'Clinical Drug', 'Ingredient', 'Clinical Finding' etc."
        data_type: varchar(20)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept_class')
                field: concept_class_id
      - name: standard_concept
        description: "This flag determines where a Concept is a Standard Concept, i.e. is used in the data, a Classification Concept, or a non-standard Source Concept. The allowable values are 'S' (Standard Concept) and 'C' (Classification Concept), otherwise the content is NULL."
        data_type: varchar(1)
      - name: concept_code
        description: "The concept code represents the identifier of the Concept in the source vocabulary, such as SNOMED-CT concept IDs, RxNorm RXCUIs etc. Note that concept codes are not unique across vocabularies."
        data_type: varchar(50)
        tests:
          - not_null
      - name: valid_start_date
        description: "The date when the Concept was first recorded. The default value is 1-Jan-1970, meaning, the Concept has no (known) date of inception."
        data_type: date
        tests:
          - not_null
      - name: valid_end_date
        description: "The date when the Concept became invalid because it was deleted or superseded (updated) by a new concept. The default value is 31-Dec-2099, meaning, the Concept is valid until it becomes deprecated."
        data_type: date
        tests:
          - not_null
      - name: invalid_reason
        description: "Reason the Concept was invalidated. Possible values are D (deleted), U (replaced with an update) or NULL when valid_end_date has the default value."
        data_type: varchar(1)

  - name: concept_cpt4
    description: "CPT4 concepts from Athena (same schema as CONCEPT, separate license). Concept names are blank without the AMA CPT license."
    columns:
      - name: concept_id
        description: "A unique identifier for each CPT4 Concept."
        data_type: integer
        tests:
          - unique
          - not_null
      - name: concept_name
        description: "An unambiguous, meaningful and descriptive name for the Concept. Blank without AMA CPT license."
        data_type: varchar(255)
        tests:
          - not_null:
              config:
                severity: warn
      - name: domain_id
        data_type: varchar(20)
        tests:
          - not_null
      - name: vocabulary_id
        data_type: varchar(20)
        tests:
          - not_null
      - name: concept_class_id
        data_type: varchar(20)
        tests:
          - not_null
      - name: standard_concept
        data_type: varchar(1)
      - name: concept_code
        data_type: varchar(50)
        tests:
          - not_null
      - name: valid_start_date
        data_type: date
        tests:
          - not_null
      - name: valid_end_date
        data_type: date
        tests:
          - not_null
      - name: invalid_reason
        data_type: varchar(1)

  - name: concept_ancestor
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#concept_ancestor"
    columns:
      - name: ancestor_concept_id
        description: "The Concept Id for the higher-level concept that forms the ancestor in the relationship."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: descendant_concept_id
        description: "The Concept Id for the lower-level concept that forms the descendant in the relationship."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: min_levels_of_separation
        description: "The minimum separation in number of levels of hierarchy between ancestor and descendant concepts. This is an attribute that is used to simplify hierarchic analysis."
        data_type: integer
        tests:
          - not_null
      - name: max_levels_of_separation
        description: "The maximum separation in number of levels of hierarchy between ancestor and descendant concepts. This is an attribute that is used to simplify hierarchic analysis."
        data_type: integer
        tests:
          - not_null

  - name: concept_class
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#concept_class"
    columns:
      - name: concept_class_id
        description: "A unique key for each class."
        data_type: varchar(20)
        tests:
          - unique
          - not_null
      - name: concept_class_name
        description: "The name describing the Concept Class, e.g. Clinical Finding, Ingredient, etc."
        data_type: varchar(255)
        tests:
          - not_null
      - name: concept_class_concept_id
        description: "A Concept that represents the Concept Class."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id

  - name: concept_relationship
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#concept_relationship"
    columns:
      - name: concept_id_1
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: concept_id_2
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: relationship_id
        description: "The relationship between CONCEPT_ID_1 and CONCEPT_ID_2. Please see the Vocabulary Conventions for more information."
        data_type: varchar(20)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('relationship')
                field: relationship_id
      - name: valid_start_date
        description: "The date when the relationship is first recorded."
        data_type: date
        tests:
          - not_null
      - name: valid_end_date
        description: "The date when the relationship is invalidated."
        data_type: date
        tests:
          - not_null
      - name: invalid_reason
        description: "Reason the relationship was invalidated. Possible values are 'D' (deleted), 'U' (updated) or NULL."
        data_type: varchar(1)

  - name: concept_synonym
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#concept_synonym"
    columns:
      - name: concept_id
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: concept_synonym_name
        data_type: varchar(1000)
        tests:
          - not_null
      - name: language_concept_id
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id

  - name: domain
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#domain"
    columns:
      - name: domain_id
        description: "A unique key for each domain."
        data_type: varchar(20)
        tests:
          - unique
          - not_null
      - name: domain_name
        description: "The name describing the Domain, e.g. Condition, Procedure, Measurement etc."
        data_type: varchar(255)
        tests:
          - not_null
      - name: domain_concept_id
        description: "A Concept representing the Domain Concept the DOMAIN record belongs to."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id

  - name: drug_strength
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#drug_strength"
    columns:
      - name: drug_concept_id
        description: "The Concept representing the Branded Drug or Clinical Drug Product."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: ingredient_concept_id
        description: "The Concept representing the active ingredient contained within the drug product."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: amount_value
        description: "The numeric value or the amount of active ingredient contained within the drug product."
        data_type: float
      - name: amount_unit_concept_id
        description: "The Concept representing the Unit of measure for the amount of active ingredient contained within the drug product."
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: numerator_value
        description: "The concentration of the active ingredient contained within the drug product."
        data_type: float
      - name: numerator_unit_concept_id
        description: "The Concept representing the Unit of measure for the concentration of active ingredient."
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: denominator_value
        description: "The amount of total liquid (or other divisible product, such as ointment, gel, spray, etc.)."
        data_type: float
      - name: denominator_unit_concept_id
        description: "The Concept representing the denominator unit for the concentration of active ingredient."
        data_type: integer
        tests:
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: box_size
        description: "The number of units of Clinical Branded Drug or Quantified Clinical or Branded Drug contained in a box as dispensed to the patient."
        data_type: integer
      - name: valid_start_date
        description: "The date when the Concept was first recorded. The default value is 1-Jan-1970."
        data_type: date
      - name: valid_end_date
        description: "The date when then Concept became invalid."
        data_type: date
      - name: invalid_reason
        description: "Reason the concept was invalidated. Possible values are D (deleted), U (replaced with an update) or NULL when valid_end_date has the default value."
        data_type: varchar(1)

  - name: relationship
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#relationship"
    columns:
      - name: relationship_id
        description: "The type of relationship captured by the relationship record."
        data_type: varchar(20)
        tests:
          - unique
          - not_null
      - name: relationship_name
        data_type: varchar(255)
        tests:
          - not_null
      - name: is_hierarchical
        description: "Defines whether a relationship defines concepts into classes or hierarchies. Values are 1 for hierarchical relationship or 0 if not."
        data_type: varchar(1)
        tests:
          - not_null
      - name: defines_ancestry
        description: "Defines whether a hierarchical relationship contributes to the concept_ancestor table. These are subsets of the hierarchical relationships. Valid values are 1 or 0."
        data_type: varchar(1)
        tests:
          - not_null
      - name: reverse_relationship_id
        description: "The identifier for the relationship used to define the reverse relationship between two concepts."
        data_type: varchar(20)
        tests:
          - not_null
      - name: relationship_concept_id
        description: "A foreign key that refers to an identifier in the CONCEPT table for the unique relationship concept."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id

  - name: vocabulary
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#vocabulary"
    columns:
      - name: vocabulary_id
        description: "A unique identifier for each Vocabulary, such as ICD9CM, SNOMED, Visit."
        data_type: varchar(20)
        tests:
          - unique
          - not_null
      - name: vocabulary_name
        description: "The name describing the vocabulary, for example, International Classification of Diseases, Ninth Revision, Clinical Modification, Volume 1 and 2 (NCHS) etc."
        data_type: varchar(255)
        tests:
          - not_null
      - name: vocabulary_reference
        description: "External reference to documentation or available download of the about the vocabulary."
        data_type: varchar(255)
      - name: vocabulary_version
        description: "Version of the Vocabulary as indicated in the source."
        data_type: varchar(255)
      - name: vocabulary_concept_id
        description: "A Concept that represents the Vocabulary the VOCABULARY record belongs to."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id

  - name: source_to_concept_map
    description: "https://ohdsi.github.io/CommonDataModel/cdm54.html#source_to_concept_map"
    columns:
      - name: source_code
        description: "The source code being translated into a Standard Concept."
        data_type: varchar(50)
        tests:
          - not_null
      - name: source_vocabulary_id
        description: "A foreign key to the VOCABULARY table defining the vocabulary of the source code that is being translated to a Standard Concept."
        data_type: varchar(20)
        tests:
          - not_null
      - name: source_code_description
        description: "An optional description for the source code. This is included as a convenience to compare the description of the source code to the name of the concept."
        data_type: varchar(255)
        tests:
          - not_null
      - name: target_concept_id
        description: "The target Concept to which the source code is being mapped."
        data_type: integer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('concept')
                field: concept_id
      - name: target_vocabulary_id
        description: "The Vocabulary of the target Concept."
        data_type: varchar(20)
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('vocabulary')
                field: vocabulary_id
      - name: valid_start_date
        description: "The date when the mapping instance was first recorded."
        data_type: date
        tests:
          - not_null
      - name: valid_end_date
        description: "The date when the mapping instance became invalid because it was deleted or superseded (updated) by a new relationship. Default value is 31-Dec-2099."
        data_type: date
        tests:
          - not_null
      - name: invalid_reason
        description: "Reason the mapping instance was invalidated. Possible values are D (deleted), U (replaced with an update) or NULL when valid_end_date has the default value."
        data_type: varchar(1)